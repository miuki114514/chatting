<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XFA Student Community</title>
    <link rel="stylesheet" href="styles.css">
    <!-- MQTT.js (本地版，国内可直接使用) -->
    <script src="mqtt.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- 顶部导航 -->
        <nav class="navbar">
            <div class="nav-brand" onclick="app.router('home')">
                <span class="logo">🌐</span>
                <span>XFA Student Community</span>
                <span class="connection-status" id="conn-status">🔴 离线</span>
                <button class="sync-btn" onclick="app.manualSync()" title="手动重新同步">🔄</button>
            </div>
            <div class="nav-links">
                <button onclick="app.router('home')" class="nav-btn active" data-page="home">🏠 首页</button>
                <button onclick="app.router('explore')" class="nav-btn" data-page="explore">🔍 探索</button>
                <button onclick="app.router('favorites')" class="nav-btn" data-page="favorites">⭐ 收藏</button>
                <button onclick="app.router('chats')" class="nav-btn" data-page="chats">💬 消息</button>
            </div>
            <div class="nav-user">
                <div id="user-section">
                    <button onclick="app.router('login')" class="btn btn-primary">登录 / 注册</button>
                </div>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main id="main-content"></main>

        <!-- 发帖弹窗 -->
        <div id="post-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="post-modal-title">✏️ 发布新帖</h2>
                    <button class="close-btn" onclick="app.closeModal('post-modal')">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>标题</label>
                        <input type="text" id="post-title" placeholder="输入标题..." maxlength="100">
                    </div>
                    <div class="form-group">
                        <label>内容</label>
                        <textarea id="post-content" placeholder="分享你的想法..." rows="6"></textarea>
                    </div>
                    <div class="form-group">
                        <label>发布身份</label>
                        <select id="post-identity">
                            <option value="real">实名发布</option>
                            <option value="anonymous">🎭 匿名发布</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>图片 / 视频</label>
                        <input type="file" id="post-files" multiple accept="image/*,video/*">
                        <div class="file-list" id="file-list"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button onclick="app.closeModal('post-modal')" class="btn btn-secondary">取消</button>
                    <button onclick="app.submitPost()" class="btn btn-primary">🚀 发布</button>
                </div>
            </div>
        </div>

        <!-- 个人主页编辑弹窗 -->
        <div id="profile-edit-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🎨 编辑个人主页</h2>
                    <button class="close-btn" onclick="app.closeModal('profile-edit-modal')">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>昵称</label>
                        <input type="text" id="edit-nickname" maxlength="20">
                    </div>
                    <div class="form-group">
                        <label>个性签名</label>
                        <input type="text" id="edit-bio" maxlength="100" placeholder="一句话介绍自己...">
                    </div>
                    <div class="form-group">
                        <label>头像</label>
                        <input type="file" id="edit-avatar" accept="image/*">
                        <div id="avatar-preview"></div>
                    </div>
                    <div class="form-group">
                        <label>主页背景色</label>
                        <input type="color" id="edit-bg-color" value="#f5f5f5">
                    </div>
                    <div class="form-group">
                        <label>主页主题</label>
                        <select id="edit-theme">
                            <option value="default">默认</option>
                            <option value="dark">暗黑</option>
                            <option value="blue">海洋蓝</option>
                            <option value="green">森林绿</option>
                            <option value="purple">梦幻紫</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><input type="checkbox" id="edit-hide-profile" style="width:auto;margin-right:8px;"> 隐藏我的资料和发帖（其他用户点我头像只能看到提示）</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button onclick="app.closeModal('profile-edit-modal')" class="btn btn-secondary">取消</button>
                    <button onclick="app.saveProfile()" class="btn btn-primary">💾 保存</button>
                </div>
            </div>
        </div>

        <!-- 图片预览弹窗 -->
        <div id="image-modal" class="modal image-modal">
            <div class="modal-content image-content">
                <button class="close-btn" onclick="app.closeModal('image-modal')">&times;</button>
                <img id="preview-image" src="" alt="预览">
            </div>
        </div>
    </div>

    <!-- 移动端底部导航 -->
    <div class="mobile-nav">
        <div class="mobile-nav-inner">
            <button onclick="app.router('home')" class="nav-btn-mobile active" data-page="home">
                <span class="nav-icon">🏠</span>
                <span>首页</span>
            </button>
            <button onclick="app.router('explore')" class="nav-btn-mobile" data-page="explore">
                <span class="nav-icon">🔍</span>
                <span>探索</span>
            </button>
            <button onclick="app.router('favorites')" class="nav-btn-mobile" data-page="favorites">
                <span class="nav-icon">⭐</span>
                <span>收藏</span>
            </button>
            <button onclick="app.router('chats')" class="nav-btn-mobile" data-page="chats">
                <span class="nav-icon">💬</span>
                <span>消息</span>
            </button>
            <button onclick="app.router('profile')" class="nav-btn-mobile" data-page="profile">
                <span class="nav-icon">👤</span>
                <span>我的</span>
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
